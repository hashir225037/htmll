<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            background: white;
            padding: 20px;
            width: 300px;
            text-align: left;
            border: 1px solid black;
        }

        h2 {
            margin-top: 0;
            color: black;
        }

        label {
            display: block;
            margin: 10px 0 5px;
            font-weight: normal;
            color: black;
        }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid black;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 12px;
            padding: 8px;
            border: 1px solid black;
            background: white;
            color: black;
            font-size: 14px;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login</h2>
        <form action="index.html" method="get">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="">

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="">

            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
